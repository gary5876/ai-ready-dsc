events {}
http {
  server {
    listen 80;

    location /api/ {
      proxy_pass http://backend:8080;
      proxy_set_header Host $host;

      # SSE를 위한 필수 설정
      proxy_buffering off;
      proxy_cache off;
      proxy_set_header X-Accel-Buffering no;
      chunked_transfer_encoding on;
    }

    location / {
      proxy_pass http://frontend:80;
    }
  }
}
