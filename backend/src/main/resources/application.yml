spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/aiready}
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: backend-result-consumer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

aws:
  access-key-id: ${AWS_ACCESS_KEY_ID:minioadmin}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:minioadmin}
  s3:
    bucket: ${S3_BUCKET:ai-ready-platform}
    region: ${AWS_REGION:ap-northeast-2}
    endpoint: ${S3_ENDPOINT_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
